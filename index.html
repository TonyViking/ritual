<style>
  :root {
    --bg:        #0d0a12;
    --surface:   #161220;
    --surface2:  #1e1828;
    --ink:       #e8e0f0;
    --ink-soft:  #7a6e8a;
    --ink-muted: #4a4058;
    --border:    #2a2238;
    --accent:    #c084fc;
    --accent2:   #818cf8;
    --c-fresh:   #4ade80;
    --c-ok:      #86efac;
    --c-soon:    #fbbf24;
    --c-due:     #f97316;
    --c-over:    #f43f5e;
    --radius:    16px;
    --safe-top:  env(safe-area-inset-top, 0px);
    --safe-bot:  env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .5;
  }

  .view { display: none; }
  .view.active { display: block; animation: fadeUp .25s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  header {
    padding: calc(var(--safe-top) + 20px) 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(to bottom, rgba(13,10,18,.97) 85%, transparent);
  }
  .wordmark {
    font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header-sub { font-size: 10px; color: var(--ink-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
  .offline-badge {
    display: inline-block; background: rgba(251,191,36,.2); color: #fbbf24;
    border: 1px solid rgba(251,191,36,.3); border-radius: 8px;
    font-size: 9px; padding: 1px 6px; margin-left: 6px;
    vertical-align: middle; letter-spacing: .5px;
  }
  .back-btn {
    background: none; border: 1px solid var(--border); border-radius: 10px;
    padding: 6px 12px; color: var(--ink-soft); font-family: 'DM Sans', sans-serif;
    font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s;
  }
  .back-btn:active { transform: scale(.93); }
  .back-btn svg { width: 12px; height: 12px; }
  .icon-btn {
    background: none; border: 1px solid var(--border); border-radius: 50%;
    width: 36px; height: 36px; display: grid; place-items: center;
    cursor: pointer; color: var(--ink-soft); transition: all .2s; flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(.88); }
  .icon-btn.spin svg { transition: transform .4s; }
  .icon-btn.spin:active svg { transform: rotate(180deg); }
  .icon-btn svg { width: 15px; height: 15px; }
  .header-right { display: flex; gap: 8px; align-items: center; }

  /* ── CONFIG BANNER ── */
  #config-banner {
    margin: 0 16px 12px;
    background: rgba(251,191,36,.08); border: 1px solid rgba(251,191,36,.25);
    border-radius: 12px; padding: 12px 14px; font-size: 12px; line-height: 1.6; color: #d4a800;
  }
  #config-banner strong { display: block; margin-bottom: 3px; font-size: 13px; }
  #config-banner a { color: #fbbf24; }
  #config-banner.hidden { display: none; }

  /* ── SECTION LABELS ── */
  .section-label {
    padding: 4px 20px 10px; font-size: 10px;
    color: var(--ink-muted); letter-spacing: 2px; text-transform: uppercase;
  }

  /* ── URGENT STRIP (home) ── */
  .urgent-strip {
    padding: 0 16px 4px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .urgent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform .15s;
    position: relative;
  }
  .urgent-card:active { transform: scale(.985); }
  .urgent-card[data-urgency="fresh"] { border-left: 3px solid var(--c-fresh); }
  .urgent-card[data-urgency="ok"]    { border-left: 3px solid var(--c-ok); }
  .urgent-card[data-urgency="soon"]  { border-left: 3px solid var(--c-soon); }
  .urgent-card[data-urgency="due"]   { border-left: 3px solid var(--c-due); }
  .urgent-card[data-urgency="over"]  { border-left: 3px solid var(--c-over); }
  .urgent-inner {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px 6px;
  }
  .urgent-meta { flex: 1; }
  .urgent-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .urgent-cat  { font-size: 10px; color: var(--ink-muted); margin-top: 2px; letter-spacing: .3px; }
  .urgent-last { font-size: 11px; color: var(--ink-soft); padding: 0 12px 8px; font-weight: 300; }
  .urgent-bar  { height: 2px; background: var(--border); overflow: hidden; }
  .urgent-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(.25,.8,.25,1); }

  /* ── DONE TODAY STRIP ── */
  .done-today-strip {
    padding: 0 16px 4px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .done-today-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: rgba(74,222,128,.06);
    border: 1px solid rgba(74,222,128,.15);
    border-radius: 12px;
    font-size: 13px; color: var(--ink-soft);
  }
  .done-today-check { color: var(--c-fresh); font-size: 14px; }
  .done-today-name { flex: 1; }
  .done-today-time { font-size: 11px; color: var(--ink-muted); }

  /* ── CATEGORY GRID ── */
  .category-grid {
    padding: 0 16px calc(var(--safe-bot) + 80px);
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .category-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 14px 14px;
    cursor: pointer; transition: transform .15s, border-color .2s;
    position: relative; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  .category-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(192,132,252,.05), transparent);
    pointer-events: none;
  }
  .category-card:active { transform: scale(.96); }
  .category-card.has-overdue { border-color: rgba(244,63,94,.4); }
  .category-card.has-due    { border-color: rgba(249,115,22,.35); }
  .category-card.long-press-active { transform: scale(.94); background: var(--surface2); }
  .cat-emoji { font-size: 26px; margin-bottom: 8px; display: block; }
  .cat-name { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; color: var(--ink); margin-bottom: 4px; }
  .cat-stats { font-size: 11px; color: var(--ink-muted); font-weight: 300; }
  .cat-urgency-bar { height: 2px; border-radius: 2px; margin-top: 10px; background: var(--border); overflow: hidden; }
  .cat-urgency-fill { height: 100%; border-radius: 2px; width: 0%; transition: width .8s cubic-bezier(.25,.8,.25,1); }
  .cat-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--c-over); color: white;
    font-size: 10px; font-weight: 700; border-radius: 10px; padding: 2px 7px;
  }
  /* Long press hint */
  .cat-hint {
    font-size: 9px; color: var(--ink-muted); margin-top: 6px;
    letter-spacing: .5px; opacity: .6;
  }

  /* ── TASK VIEW ── */
  .task-view-header { padding: 0 20px 10px; }
  .task-cat-title {
    font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700;
    letter-spacing: 2px; display: flex; align-items: center; gap: 10px;
  }
  .legend {
    display: flex; gap: 10px; padding: 0 16px 10px; flex-wrap: wrap;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--ink-muted); letter-spacing: .3px;
  }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .filter-bar {
    display: flex; gap: 8px; padding: 0 16px 14px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    color: var(--ink-soft); cursor: pointer; transition: all .15s; letter-spacing: .2px;
  }
  .filter-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border-color: transparent;
  }

  /* ── TASK LIST ── */
  .task-list {
    padding: 0 16px calc(var(--safe-bot) + 80px);
    display: flex; flex-direction: column; gap: 10px;
  }

  /* ── TASK CARD (swipeable) ── */
  .task-card-wrap {
    position: relative; border-radius: var(--radius); overflow: hidden;
  }
  .swipe-bg {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(74,222,128,.25), rgba(74,222,128,.1));
    display: flex; align-items: center; padding-left: 20px;
    font-size: 18px; opacity: 0; transition: opacity .15s;
    border-radius: var(--radius);
    pointer-events: none;
  }
  .swipe-bg.visible { opacity: 1; }
  .task-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: transform .05s, box-shadow .15s;
    position: relative; z-index: 1;
    touch-action: pan-y;
    -webkit-user-select: none; user-select: none;
  }
  .task-card[data-urgency="fresh"] { border-left: 3px solid var(--c-fresh); }
  .task-card[data-urgency="ok"]    { border-left: 3px solid var(--c-ok); }
  .task-card[data-urgency="soon"]  { border-left: 3px solid var(--c-soon); }
  .task-card[data-urgency="due"]   { border-left: 3px solid var(--c-due); }

<script>
/* ═══════════════════════════════════════════════════
   CONFIGURATION
   ═══════════════════════════════════════════════════
   Sheet layout:
     A = Task name
     B = Min days
     C = Max days
     D = Last done (written by app)
     E = Category codes, space-separated  e.g. "self mind"
     I = Category legend  e.g. "self = Self Care 🪥"
═══════════════════════════════════════════════════ */
const CONFIG = {
  SHEET_ID:      '16nGtOxBWpYW8_go2DzqBh_IXAiciwlEzDzO8N2VirvQ',
  SHEET_NAME:    'Sheet1',
  API_KEY:       'AIzaSyDb065U8j5l8LhKNzcz3onSoDxknA4d7rU',
  COL_NAME:      1,
  COL_MIN:       2,
  COL_MAX:       3,
  COL_LAST_DONE: 4,
  COL_CATS:      5,   // E  — space-separated category codes
  COL_ONEOFF:    6,   // F  — "1" if one-off task
  COL_LEGEND:    9,   // I  — "code = Name Emoji"
  ARCHIVE_SHEET: 'Sheet2', // tab for completed one-offs
  DATA_START_ROW: 2,
};
const OAUTH_CLIENT_ID = '321304865512-53n0nqgmg7il2i7mjinni0efd025lpgi.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

// ─── State ────────────────────────────────────────
let tokenClient     = null;
let accessToken     = null;
let pendingWrite    = null;
let allTasks        = [];
let categories      = [];
let currentCategory = null;
let filterDays      = 4;
const catFilters    = {};

// ─── Legend cache ─────────────────────────────────
// Legend (col I) almost never changes so we cache it in localStorage.
// It is only re-fetched when the user explicitly hits Refresh or the
// cache is older than LEGEND_TTL_MS.
const LEGEND_KEY    = 'ritual_legend_v1';
const LEGEND_TTL_MS = 24 * 60 * 60 * 1000; // 24 hours

function saveLegendCache(cats) {
  try {
    localStorage.setItem(LEGEND_KEY, JSON.stringify({ ts: Date.now(), cats }));
  } catch(e) {}
}

function loadLegendCache() {
  try {
    const raw = localStorage.getItem(LEGEND_KEY);
    if (!raw) return null;
    const { ts, cats } = JSON.parse(raw);
    if (Date.now() - ts > LEGEND_TTL_MS) return null;
    return cats;
  } catch(e) { return null; }
}

function bustLegendCache() {
  try { localStorage.removeItem(LEGEND_KEY); } catch(e) {}
}

// ─── Helpers ──────────────────────────────────────
const colLetter = n => String.fromCharCode(64 + n);

function formatDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const pad = n => String(n).padStart(2,'0');
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function parseDate(s) {
  if (!s) return null;
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function daysSince(date) {
  if (!date) return Infinity;
  return (Date.now() - date.getTime()) / 86400000;
}

function urgencyRatio(min, max, days) {
  if (!isFinite(days)) return 1.5;
  if (max <= 0) return 0;
  return days / max;
}

function urgencyLevel(ratio) {
  if (ratio <= 0.35) return 'fresh';
  if (ratio <= 0.65) return 'ok';
  if (ratio <= 0.85) return 'soon';
  if (ratio <= 1.0)  return 'due';
  return 'over';
}

function urgencyColor(ratio) {
  return {fresh:'var(--c-fresh)',ok:'var(--c-ok)',soon:'var(--c-soon)',due:'var(--c-due)',over:'var(--c-over)'}[urgencyLevel(ratio)];
}

function relativeTime(date) {
  if (!date) return 'Never done';
  const d   = daysSince(date);
  const now = new Date();
  const hr  = now.getHours();

  if (d < 0.04) return 'Done just now';

  // Same calendar day
  if (d < 1) {
    const doneHr = new Date(date).getHours();
    if (doneHr < 12 && hr >= 12) return 'Done this morning';
    return 'Done today';
  }

  // Previous calendar day
  if (d < 2) {
    const doneHr = new Date(date).getHours();
    if (doneHr >= 18) return 'Done last night';
    if (doneHr >= 12) return 'Done yesterday afternoon';
    return 'Done yesterday';
  }

  const days = Math.floor(d);
  return `Done ${days} day${days !== 1 ? 's' : ''} ago`;
}

function isDoneToday(date) {
  if (!date) return false;
  const now = new Date();
  const d   = new Date(date);
  return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
}

function showToast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function catName(code)  { const c = categories.find(c => c.code === code); return c ? c.name  : code; }
function catEmoji(code) { const c = categories.find(c => c.code === code); return c ? c.emoji : ''; }

function parseLegend(rows) {
  const cats = [];
  rows.forEach(row => {
    const cell = (row[CONFIG.COL_LEGEND - 1] || '').trim();
    if (!cell) return;
    const m = cell.match(/^([^\s=]+)\s*=\s*(.+)$/);
    if (!m) return;
    const code = m[1].toLowerCase();
    const rest = m[2].trim();
    const em   = rest.match(/^(.*?)\s*(\p{Emoji}+)\s*$/u);
    let name, emoji;
    if (em) { name = em[1].trim() || em[2]; emoji = em[2]; }
    else     { name = rest; emoji = '📌'; }
    if (!cats.find(c => c.code === code)) cats.push({ code, name, emoji });
  });
  return cats;
}

// ─── Load data ────────────────────────────────────
// forceRefresh=true busts the legend cache (used by the refresh button)
async function loadData(forceRefresh = false) {
  if (CONFIG.SHEET_ID === 'YOUR_SHEET_ID_HERE') {
    document.getElementById('config-banner').classList.remove('hidden');
    loadDemo(); return;
  }

  document.getElementById('home-content').innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading…</div>';

  if (forceRefresh) bustLegendCache();

  const cachedLegend = loadLegendCache();

  try {
    if (cachedLegend) {
      // ── Fast path: legend from cache, only fetch task data (cols A–E) ──
      categories = cachedLegend;
      const range = encodeURIComponent(`${CONFIG.SHEET_NAME}!A${CONFIG.DATA_START_ROW}:F`);
      const url   = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${range}?key=${CONFIG.API_KEY}`;
      const res   = await fetch(url);
      const data  = await res.json();
      if (data.error) throw new Error(data.error.message);
      const rows = data.values || [];
      allTasks = parseTaskRows(rows);
    } else {
      // ── Slow path: fetch everything including legend (cols A–I) ──
      const range = encodeURIComponent(`${CONFIG.SHEET_NAME}!A${CONFIG.DATA_START_ROW}:I`);
      const url   = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${range}?key=${CONFIG.API_KEY}`;
      const res   = await fetch(url);
      const data  = await res.json();
      if (data.error) throw new Error(data.error.message);
      const rows = data.values || [];
      categories = parseLegend(rows);
      saveLegendCache(categories);
      allTasks = parseTaskRows(rows);
    }

    renderHome();
    if (currentCategory) renderTasks();
  } catch(e) {
    document.getElementById('home-content').innerHTML =
      `<div class="error-msg">⚠️ Couldn't load<br>${e.message}<br><br>Check Sheet ID, API key,<br>and that the sheet is public.</div>`;
  }
}

function parseTaskRows(rows) {
  return rows
    .filter(r => r[CONFIG.COL_NAME - 1])
    .map((row, i) => ({
      name:     row[CONFIG.COL_NAME - 1] || '',
      minDays:  parseFloat(row[CONFIG.COL_MIN - 1]) || 1,
      maxDays:  parseFloat(row[CONFIG.COL_MAX - 1]) || 7,
      lastDone: parseDate(row[CONFIG.COL_LAST_DONE - 1]),
      cats:     (row[CONFIG.COL_CATS - 1] || '').toLowerCase().split(' ').filter(Boolean),
      oneOff:   (row[CONFIG.COL_ONEOFF - 1] || '').trim() === '1',
      sheetRow: CONFIG.DATA_START_ROW + i,
    }));
}

function loadDemo() {
  categories = [
    { code:'self',     name:'Self Care',  emoji:'🪥' },
    { code:'mind',     name:'Mind',       emoji:'🧠' },
    { code:'connect',  name:'Connection', emoji:'🥂' },
    { code:'intimate', name:'Intimacy',   emoji:'🌹' },

  allTasks = [
    { name:'Brush teeth',       minDays:.3, maxDays:.5,  cats:['self'],               lastDone:new Date(Date.now()-9*3600000),   sheetRow:2 },
    { name:'Skincare',          minDays:.5, maxDays:1,   cats:['self'],               lastDone:new Date(Date.now()-25*3600000),  sheetRow:7 },
    { name:'Journaling',        minDays:1,  maxDays:3,   cats:['mind','self'],        lastDone:new Date(Date.now()-4*86400000),  sheetRow:6 },
    { name:'Therapy',           minDays:6,  maxDays:8,   cats:['mind'],               lastDone:new Date(Date.now()-9*86400000),  sheetRow:3 },
    { name:'Casual date night', minDays:5,  maxDays:10,  cats:['connect'],            lastDone:new Date(Date.now()-12*86400000), sheetRow:4 },
    { name:'Sexy date night',   minDays:3,  maxDays:7,   cats:['intimate','connect'], lastDone:new Date(Date.now()-8*86400000),  sheetRow:5 },
  ];
  renderHome();

// ─── HOME ─────────────────────────────────────────
function showHome() {
  document.getElementById('view-home').classList.add('active');
  document.getElementById('view-tasks').classList.remove('active');
  currentCategory = null;
  renderHome();
}

function renderHome() {
  const el = document.getElementById('home-content');

  // Sort categories by their most urgent task ratio (desc)
  const sortedCats = [...categories].sort((a, b) => {
    const maxRatio = cat => {
      const ratios = allTasks.filter(t => t.cats.includes(cat.code))
        .map(t => urgencyRatio(t.minDays, t.maxDays, daysSince(t.lastDone)));
      return ratios.length ? Math.max(...ratios) : 0;
    };
    return maxRatio(b) - maxRatio(a);
  });

  // Top urgent tasks across all cats (not done today, sorted by ratio desc)
  const urgentTasks = [...allTasks]
    .filter(t => !isDoneToday(t.lastDone))
    .map(t => ({ ...t, ratio: urgencyRatio(t.minDays, t.maxDays, daysSince(t.lastDone)) }))
    .filter(t => t.ratio >= 0.7)
    .sort((a, b) => b.ratio - a.ratio)
    .slice(0, 5);

  // Done today
  const doneToday = [...allTasks]
    .filter(t => isDoneToday(t.lastDone))
    .sort((a, b) => new Date(b.lastDone) - new Date(a.lastDone));

  let html = '';

  // ── Urgent strip ──
  if (urgentTasks.length > 0) {
    html += '<div class="section-label">Needs attention</div>';
    html += '<div class="urgent-strip" id="urgent-strip">';
    urgentTasks.forEach(t => {
      const level = urgencyLevel(t.ratio);
      const color = urgencyColor(t.ratio);
      const width = Math.min(t.ratio * 100, 100) + '%';
      const catLabels = t.cats.map(c => catEmoji(c) + ' ' + catName(c)).join(' · ');
      html += `
        <div class="urgent-card" data-urgency="${level}" data-row="${t.sheetRow}">
          <div class="urgent-inner">
            <div class="urgent-meta">
              <div class="urgent-name">${t.name}</div>
              <div class="urgent-cat">${catLabels}</div>
            </div>
            <button class="done-btn" onclick="markDoneHome(${t.sheetRow}, this)">Done</button>
          </div>
          <div class="urgent-last">${relativeTime(t.lastDone)}</div>
          <div class="urgent-bar"><div class="urgent-fill" style="background:${color}" data-target="${width}"></div></div>
        </div>`;
    });
    html += '</div>';
  }

  // ── Category grid ──
  if (sortedCats.length === 0) {
    html += '<div class="empty-state"><span class="e-icon">💀</span>No categories found.<br><span style="font-size:12px;opacity:.6">Add entries to column I of your sheet<br>e.g. <code>self = Self Care 🪥</code></span></div>';
  } else {
    html += '<div class="section-label" style="margin-top:16px">Categories</div>';
    html += '<div class="category-grid" id="cat-grid">';
    sortedCats.forEach(cat => {
      const catTasks = allTasks.filter(t => t.cats.includes(cat.code));
      const ratios   = catTasks.map(t => urgencyRatio(t.minDays, t.maxDays, daysSince(t.lastDone)));
      const maxRatio = ratios.length ? Math.max(...ratios) : 0;
      const overdue  = ratios.filter(r => r >= 1).length;
      const due      = ratios.filter(r => r >= 0.85 && r < 1).length;
      const fillColor = urgencyColor(maxRatio);
      const fillPct   = Math.min(maxRatio * 100, 100);
      const cls = overdue ? ' has-overdue' : due ? ' has-due' : '';
      // Most overdue task name for long press hint
      const topTask = catTasks
        .map(t => ({ ...t, ratio: urgencyRatio(t.minDays, t.maxDays, daysSince(t.lastDone)) }))
        .sort((a,b) => b.ratio - a.ratio)[0];
      html += `
        <div class="category-card${cls}" data-cat="${cat.code}" data-top-row="${topTask ? topTask.sheetRow : ''}" data-top-name="${topTask ? topTask.name : ''}">
          ${overdue ? `<div class="cat-badge">${overdue} due</div>` : ''}
          <span class="cat-emoji">${cat.emoji}</span>
          <div class="cat-name">${cat.name}</div>
          <div class="cat-stats">${catTasks.length} ritual${catTasks.length !== 1 ? 's' : ''}</div>
          <div class="cat-urgency-bar"><div class="cat-urgency-fill" style="background:${fillColor}" data-target="${fillPct}%"></div></div>
          ${topTask && topTask.ratio >= 0.7 ? `<div class="cat-hint">hold to mark "${topTask.name}" done</div>` : ''}
        </div>`;
    });
    html += '</div>';
  }

  // ── Done today ──
  if (doneToday.length > 0) {
    html += '<div class="section-label" style="margin-top:16px">Done today</div>';
    html += '<div class="done-today-strip">';
    doneToday.forEach(t => {
      const time = t.lastDone ? new Date(t.lastDone).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
      html += `
        <div class="done-today-row">
          <span class="done-today-check">✓</span>
          <span class="done-today-name">${t.name}</span>
          <span class="done-today-time">${time}</span>
        </div>`;
    });
    html += '</div>';
  }

  el.innerHTML = html;

  // Animate urgency bars
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.querySelectorAll('[data-target]').forEach(el => { el.style.width = el.dataset.target; });
  }));

  // Attach category card events (tap + long press)
  el.querySelectorAll('.category-card').forEach(card => {
    attachCatCardEvents(card);
  });
}

// ─── Category card: tap + long press ──────────────
function attachCatCardEvents(card) {
  let pressTimer = null;
  let pressing   = false;

  const startPress = (e) => {
    pressing = true;
    card.classList.add('long-press-active');
    pressTimer = setTimeout(() => {
      if (!pressing) return;
      const topRow  = card.dataset.topRow;
      const topName = card.dataset.topName;
      if (!topRow || !topName) { showToast('No tasks due in this category'); card.classList.remove('long-press-active'); return; }
      // Show confirm overlay
      const lp = document.getElementById('lp-confirm');
      lp.innerHTML = `Mark <strong>${topName}</strong> as done? <br><span style="font-size:11px;opacity:.6">Tap again to confirm</span>`;
      lp.classList.add('show');
      lp.dataset.row  = topRow;
      lp.dataset.name = topName;
      card.classList.remove('long-press-active');
      setTimeout(() => lp.classList.remove('show'), 4000);
    }, 600);
  };

  const endPress = (e) => {
    pressing = false;
    card.classList.remove('long-press-active');
    clearTimeout(pressTimer);
    // Regular tap — only if lp-confirm not showing
    const lp = document.getElementById('lp-confirm');
    if (!lp.classList.contains('show')) {
      showTasks(card.dataset.cat);
    }
  };

  const cancelPress = () => {
    pressing = false;
    card.classList.remove('long-press-active');
    clearTimeout(pressTimer);
  };

  card.addEventListener('touchstart', startPress, { passive: true });
  card.addEventListener('touchend',   endPress);
  card.addEventListener('touchmove',  cancelPress, { passive: true });
  card.addEventListener('mousedown',  startPress);
  card.addEventListener('mouseup',    endPress);
  card.addEventListener('mouseleave', cancelPress);
}

// Long press confirm tap
document.addEventListener('click', (e) => {
  const lp = document.getElementById('lp-confirm');
  if (lp.classList.contains('show')) {
    const row  = parseInt(lp.dataset.row);
    const name = lp.dataset.name;
    lp.classList.remove('show');
    if (row) markDoneHome(row, null, name);
  }
});

// ─── Offline write queue ─────────────────────────
// When offline, writes are queued in localStorage and flushed
// automatically when the connection is restored.
const QUEUE_KEY = 'ritual_write_queue_v1';

function getQueue() {
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; } catch { return []; }
}

function saveQueue(q) {
  try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch {}
}

function enqueue(sheetRow, value) {
  const q = getQueue();
  // Remove any existing entry for this row (keep only latest)
  const filtered = q.filter(item => item.sheetRow !== sheetRow);
  filtered.push({ sheetRow, value, ts: Date.now() });
  saveQueue(filtered);
}

function dequeue(sheetRow) {
  const q = getQueue().filter(item => item.sheetRow !== sheetRow);
  saveQueue(q);
}

async function flushQueue() {
  if (!accessToken) return;
  const q = getQueue();
  if (q.length === 0) return;
  let flushed = 0;
  for (const item of q) {
    const range = `${CONFIG.SHEET_NAME}!${colLetter(CONFIG.COL_LAST_DONE)}${item.sheetRow}`;
    const url   = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
    try {
      const res = await fetch(url, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[item.value]] }),
      });
      const data = await res.json();
      if (!data.error) { dequeue(item.sheetRow); flushed++; }
    } catch {}
  }
  if (flushed > 0) showToast(`${flushed} queued update${flushed > 1 ? 's' : ''} synced ✓`);
}

// Flush when coming back online
window.addEventListener('online', () => {
  showToast('Back online — syncing…');
  setTimeout(flushQueue, 800);
});

// ─── Mark Done from home ──────────────────────────
async function markDoneHome(sheetRow, btn, taskName) {
  if (CONFIG.SHEET_ID === 'YOUR_SHEET_ID_HERE') { showToast('Demo mode — configure sheet to save'); return; }
  if (btn) btn.disabled = true;
  const now   = new Date();
  const value = formatDate(now);
  const range = `${CONFIG.SHEET_NAME}!${colLetter(CONFIG.COL_LAST_DONE)}${sheetRow}`;

  // Apply locally immediately regardless of connectivity
  applyDoneLocally(sheetRow, now, btn);

  if (!navigator.onLine) {
    enqueue(sheetRow, value);
    showToast('Saved locally — will sync when online 📶');
    return;
  }

  const cb = async () => {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
    try {
      const res = await fetch(url, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[value]] }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      dequeue(sheetRow); // ensure not in queue if it was
    } catch(e) {
      // Network failed mid-request — queue it
      enqueue(sheetRow, value);
      showToast('Queued — will sync when online 📶');
    }
  };

  if (accessToken) { await cb(); }
  else { pendingWrite = { customCallback: cb }; initOAuth(); }
}

// ─── TASKS VIEW ───────────────────────────────────
function showTasks(catCode) {
  currentCategory = catCode;
  // Restore remembered filter for this category
  filterDays = catFilters[catCode] || 4;
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-tasks').classList.add('active');
  document.getElementById('task-view-emoji').textContent = catEmoji(catCode);
  document.getElementById('task-view-title').textContent = catName(catCode);
  // Sync filter pill UI
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.days) === filterDays);
  });
  renderTasks();
}

function setFilter(days) {
  filterDays = days;
  if (currentCategory) catFilters[currentCategory] = days;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.days) === days);
  });
  renderTasks();
}

function renderTasks() {
  const list = document.getElementById('task-list');
  // Keep swipe hint, clear rest
  list.innerHTML = '<div class="swipe-hint">← swipe left to done · snooze right</div>';

  const catTasks = allTasks.filter(t => t.cats.includes(currentCategory));
  const sorted   = [...catTasks].sort((a, b) =>
    urgencyRatio(b.minDays, b.maxDays, daysSince(b.lastDone)) -
    urgencyRatio(a.minDays, a.maxDays, daysSince(a.lastDone))
  );
  const filtered = sorted.filter(t => {
    const ratio       = urgencyRatio(t.minDays, t.maxDays, daysSince(t.lastDone));
    const daysUntilDue = t.maxDays - daysSince(t.lastDone);
    if (filterDays === 999) return ratio >= 1;
    return daysUntilDue <= filterDays || ratio >= 1;
  });

  if (filtered.length === 0) {
    list.innerHTML += `<div class="empty-state"><span class="e-icon">✨</span>All caught up!<br><span style="font-size:12px;opacity:.6">Nothing due within ${filterDays === 999 ? 'the deadline' : filterDays + ' day' + (filterDays !== 1 ? 's' : '')}.</span></div>`;
    return;
  }

  filtered.filter(t => !isSnoozed(t.sheetRow)).forEach(task => {
    const ratio = urgencyRatio(task.minDays, task.maxDays, daysSince(task.lastDone));
    const level = urgencyLevel(ratio);
    const color = urgencyColor(ratio);
    const width = Math.min(ratio * 100, 100) + '%';
    const otherCats = task.cats.filter(c => c !== currentCategory)
      .map(c => catEmoji(c) + ' ' + catName(c)).filter(Boolean).join(' · ');

    const wrap = document.createElement('div');
    wrap.className = 'task-card-wrap';

    const bgDone = document.createElement('div');
    bgDone.className = 'swipe-bg-done';
    bgDone.innerHTML = '✓';

    const bgSnooze = document.createElement('div');
    bgSnooze.className = 'swipe-bg-snooze';
    bgSnooze.innerHTML = '💤';

    const card = document.createElement('div');
    card.className = 'task-card';
    card.dataset.urgency = level;
    card.dataset.row = task.sheetRow;
    card.innerHTML = `
      <div class="task-inner">
        <div class="task-info">
          <div class="task-name">${task.name}</div>
          ${otherCats ? `<div class="task-cats">Also in: ${otherCats}</div>` : ''}
          ${task.oneOff ? `<div class="task-cats" style="color:var(--accent)">✦ One-off</div>` : ''}
        </div>
      </div>
      <div class="task-last">${relativeTime(task.lastDone)}</div>
      <div class="urgency-bar"><div class="urgency-fill" style="background:${color}" data-target="${width}"></div></div>
    `;

    wrap.appendChild(bgDone);
    wrap.appendChild(bgSnooze);
    wrap.appendChild(card);
    list.appendChild(wrap);

    attachSwipe(card, bgDone, bgSnooze, task.sheetRow);
  });

  requestAnimationFrame(() => requestAnimationFrame(() => {
    list.querySelectorAll('.urgency-fill').forEach(el => { el.style.width = el.dataset.target; });
  }));
}

// ─── Swipe to done ────────────────────────────────
function attachSwipe(card, bgDone, bgSnooze, sheetRow) {
  let startX = 0, startY = 0, dx = 0;
  let tracking = false;
  const THRESHOLD = 90;

  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    tracking = true;
    dx = 0;
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (!tracking) return;
    const moveX = e.touches[0].clientX - startX;
    const moveY = e.touches[0].clientY - startY;
    if (Math.abs(moveY) > Math.abs(moveX) + 10) {
      tracking = false;
      card.style.transform = '';
      bgDone.classList.remove('visible');
      bgSnooze.classList.remove('visible');
      return;
    }
    dx = Math.max(-140, Math.min(moveX, 140));
    card.style.transform = `translateX(${dx}px)`;
    card.style.transition = 'none';
    bgDone.classList.toggle('visible', dx < -30);
    bgSnooze.classList.toggle('visible', dx > 30);
  }, { passive: true });

  card.addEventListener('touchend', () => {
    if (!tracking) return;
    tracking = false;
    card.style.transition = '';
    bgDone.classList.remove('visible');
    bgSnooze.classList.remove('visible');

    if (dx <= -THRESHOLD) {
      // Swipe left — mark done
      card.style.transform = 'translateX(-110%)';
      card.style.opacity = '0';
      markDoneTask(sheetRow, null);
      setTimeout(() => card.closest('.task-card-wrap')?.remove(), 400);
    } else if (dx >= THRESHOLD) {
      // Swipe right — snooze 1 day
      card.style.transform = 'translateX(110%)';
      card.style.opacity = '0';
      snoozeTask(sheetRow);
      setTimeout(() => card.closest('.task-card-wrap')?.remove(), 400);
    } else {
      card.style.transform = '';
    }
    dx = 0;
  });
}

// ─── Mark Done (task view) ────────────────────────
async function markDoneTask(sheetRow, btn) {
  if (CONFIG.SHEET_ID === 'YOUR_SHEET_ID_HERE') { showToast('Demo mode — configure sheet to save'); return; }
  if (btn) btn.disabled = true;
  const now   = new Date();
  const value = formatDate(now);
  const range = `${CONFIG.SHEET_NAME}!${colLetter(CONFIG.COL_LAST_DONE)}${sheetRow}`;

  // Apply locally immediately
  applyDoneLocally(sheetRow, now, btn);

  if (!navigator.onLine) {
    enqueue(sheetRow, value);
    showToast('Saved locally — will sync when online 📶');
    return;
  }

  if (accessToken) { await writeToSheet(range, value, btn, sheetRow, now, false); }
  else { pendingWrite = { range, value, btn, sheetRow, timestamp: now, isHome: false }; initOAuth(); }
}

async function writeToSheet(range, value, btn, sheetRow, timestamp, isHome) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
  try {
    const res = await fetch(url, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [[value]] }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    applyDoneLocally(sheetRow, timestamp, btn);

    // If one-off, archive to Sheet2 then delete from Sheet1
    const task = allTasks.find(t => t.sheetRow === sheetRow);
    if (task?.oneOff) {
      setTimeout(() => archiveAndDeleteOneOff(sheetRow, task.name, task.cats, timestamp), 1500);
    }
  } catch(e) {
    showToast('Save failed — ' + e.message);
    if (btn) btn.disabled = false;
  }
}

// ─── Apply done result locally without full re-render ─────────
// Updates in-memory task, patches affected DOM nodes, and adds
// the task to the "Done today" strip without touching anything else.
function applyDoneLocally(sheetRow, timestamp, btn) {
  // 1. Update in-memory task
  const task = allTasks.find(t => t.sheetRow === sheetRow);
  if (task) task.lastDone = timestamp;

  // 2. Update the task card if visible (task view)
  if (btn) {
    btn.classList.add('saving'); btn.textContent = '✓';
    setTimeout(() => { btn.classList.remove('saving'); btn.textContent = 'Done'; btn.disabled = false; }, 1800);
    const card = btn.closest('.task-card');
    if (card) {
      card.querySelector('.task-last').textContent = 'Done just now';
      card.querySelector('.urgency-fill').style.width = '3%';
      card.querySelector('.urgency-fill').style.background = 'var(--c-fresh)';
      card.dataset.urgency = 'fresh';
    }
  }

  showToast('Marked as done ✓');

  // 3. Patch home screen without full rebuild
  requestAnimationFrame(() => patchHomeAfterDone(sheetRow, timestamp));
}

function patchHomeAfterDone(sheetRow, timestamp) {
  const homeEl = document.getElementById('home-content');
  if (!homeEl) return;

  // ── a) Remove the urgent card for this task if present ──
  const urgentCard = homeEl.querySelector(`.urgent-card[data-row="${sheetRow}"]`);
  if (urgentCard) {
    urgentCard.style.transition = 'opacity .3s, transform .3s';
    urgentCard.style.opacity = '0';
    urgentCard.style.transform = 'translateX(20px)';
    setTimeout(() => {
      urgentCard.remove();
      // If strip is now empty, remove its label too
      const strip = homeEl.querySelector('#urgent-strip');
      if (strip && strip.children.length === 0) {
        strip.previousElementSibling?.remove(); // section label
        strip.remove();
      }
    }, 300);
  }

  // ── b) Update the category card(s) for this task ──
  const task = allTasks.find(t => t.sheetRow === sheetRow);
  if (task) {
    task.cats.forEach(catCode => {
      const catCard = homeEl.querySelector(`.category-card[data-cat="${catCode}"]`);
      if (!catCard) return;

      const catTasks = allTasks.filter(t => t.cats.includes(catCode));
      const ratios   = catTasks.map(t => urgencyRatio(t.minDays, t.maxDays, daysSince(t.lastDone)));
      const maxRatio = ratios.length ? Math.max(...ratios) : 0;
      const overdue  = ratios.filter(r => r >= 1).length;
      const due      = ratios.filter(r => r >= 0.85 && r < 1).length;

      // Update border class
      catCard.classList.remove('has-overdue', 'has-due');
      if (overdue) catCard.classList.add('has-overdue');
      else if (due) catCard.classList.add('has-due');

      // Update badge
      const badge = catCard.querySelector('.cat-badge');
      if (overdue) {
        if (badge) badge.textContent = `${overdue} due`;
        else {
          const b = document.createElement('div');
          b.className = 'cat-badge';
          b.textContent = `${overdue} due`;
          catCard.appendChild(b);
        }
      } else if (badge) badge.remove();

      // Update urgency bar
      const fill = catCard.querySelector('.cat-urgency-fill');
      if (fill) {
        fill.style.background = urgencyColor(maxRatio);
        fill.style.width = Math.min(maxRatio * 100, 100) + '%';
      }

      // Update hint
      const topTask = catTasks
        .map(t => ({ ...t, ratio: urgencyRatio(t.minDays, t.maxDays, daysSince(t.lastDone)) }))
        .sort((a,b) => b.ratio - a.ratio)[0];
      let hint = catCard.querySelector('.cat-hint');
      if (topTask && topTask.ratio >= 0.7) {
        const hintText = `hold to mark "${topTask.name}" done`;
        catCard.dataset.topRow  = topTask.sheetRow;
        catCard.dataset.topName = topTask.name;
        if (hint) hint.textContent = hintText;
        else {
          hint = document.createElement('div');
          hint.className = 'cat-hint';
          hint.textContent = hintText;
          catCard.appendChild(hint);
        }
      } else {
        hint?.remove();
        catCard.dataset.topRow  = '';
        catCard.dataset.topName = '';
      }
    });
  }

  // ── c) Add to / update "Done today" strip ──
  const time = timestamp.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  const taskName = task ? task.name : '';

  // Check if done-today section exists
  let doneStrip = homeEl.querySelector('.done-today-strip');
  if (!doneStrip) {
    // Create section from scratch
    const label = document.createElement('div');
    label.className = 'section-label';
    label.style.marginTop = '16px';
    label.textContent = 'Done today';
    homeEl.appendChild(label);
    doneStrip = document.createElement('div');
    doneStrip.className = 'done-today-strip';
    homeEl.appendChild(doneStrip);
  }

  // Prepend new done row
  const row = document.createElement('div');
  row.className = 'done-today-row';
  row.style.opacity = '0';
  row.innerHTML = `<span class="done-today-check">✓</span><span class="done-today-name">${taskName}</span><span class="done-today-time">${time}</span>`;
  doneStrip.insertBefore(row, doneStrip.firstChild);
  requestAnimationFrame(() => { row.style.transition = 'opacity .3s'; row.style.opacity = '1'; });
}

  document.getElementById('add-sheet').classList.remove('open');
}

async function submitNewTask() {
  const name = document.getElementById('new-name').value.trim();
  const min  = parseFloat(document.getElementById('new-min').value);
  const max  = parseFloat(document.getElementById('new-max').value);
  const cats = Array.from(document.querySelectorAll('#new-cat-checks input:checked')).map(cb => cb.value);

  if (!name)        { showToast('Please enter a name'); return; }
  if (!min || !max) { showToast('Please enter min and max days'); return; }
  if (min > max)    { showToast('Min must be ≤ max days'); return; }
  if (CONFIG.SHEET_ID === 'YOUR_SHEET_ID_HERE') { showToast('Demo mode — configure sheet to save'); return; }

  const btn = document.getElementById('add-submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const range = encodeURIComponent(`${CONFIG.SHEET_NAME}!A:E`);
  const url   = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${range}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;

  const doAppend = async () => {
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[name, min, max, '', cats.join(' '), document.getElementById('new-oneoff').checked ? '1' : '']] }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      showToast(`"${name}" added ✓`);
      closeAddTask();
      document.getElementById('new-name').value = '';
      document.getElementById('new-min').value  = '';
      document.getElementById('new-max').value  = '';
      document.querySelectorAll('#new-cat-checks input').forEach(cb => cb.checked = false);
      document.getElementById('new-oneoff').checked = false;
      await loadData();
    } catch(e) {
      showToast('Failed — ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Add Ritual';
    }
  };

  if (accessToken) { await doAppend(); }
  else { pendingWrite = { customCallback: doAppend }; initOAuth(); }
}

// ─── Archive one-off to Sheet2 then delete from Sheet1 ──
async function archiveAndDeleteOneOff(sheetRow, taskName, taskCats, completedAt) {
  try {
    // 1. Append to Sheet2: Name | Date Completed | Categories
    const catLabels    = taskCats.map(c => catName(c)).filter(Boolean).join(', ');
    const archiveRange = encodeURIComponent(`${CONFIG.ARCHIVE_SHEET}!A:C`);
    const archiveUrl   = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${archiveRange}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
    await fetch(archiveUrl, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [[taskName, formatDate(completedAt), catLabels]] }),
    });

    // 2. Get sheet metadata to find numeric sheetId
    const metaUrl = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}?key=${CONFIG.API_KEY}`;
    const meta    = await fetch(metaUrl).then(r => r.json());
    const sheet   = meta.sheets.find(s => s.properties.title === CONFIG.SHEET_NAME);
    if (!sheet) return;

    // 3. Delete row from Sheet1
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}:batchUpdate`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        requests: [{ deleteDimension: {
          range: { sheetId: sheet.properties.sheetId, dimension: 'ROWS', startIndex: sheetRow - 1, endIndex: sheetRow }
        }}]
      }),
    });

    // 4. Update in-memory
    allTasks = allTasks.filter(t => t.sheetRow !== sheetRow);
    allTasks = allTasks.map(t => t.sheetRow > sheetRow ? { ...t, sheetRow: t.sheetRow - 1 } : t);
    renderHome();
    if (currentCategory) renderTasks();
    showToast('Archived to Past One-offs ✓');
  } catch(e) {
    console.warn('Archive failed:', e.message);
    showToast('Archive failed — ' + e.message);
  }
}

// ─── Past One-offs ────────────────────────────────
async function openPastOneOffs() {
  document.getElementById('past-overlay').classList.add('open');
  document.getElementById('past-sheet').classList.add('open');

  const container = document.getElementById('past-list');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading…</div>';

  if (CONFIG.SHEET_ID === 'YOUR_SHEET_ID_HERE') {
    container.innerHTML = renderPastRows([
      ['Meditate at the beach', '28 Mar 2026 09:00', 'Mind'],
      ['Book dentist',          '15 Mar 2026 14:30', 'Self Care'],
      ['Send thank you card',   '02 Mar 2026 11:00', ''],
    ]);
    return;
  }

  try {
    const range = encodeURIComponent(`${CONFIG.ARCHIVE_SHEET}!A:C`);
    const url   = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${range}?key=${CONFIG.API_KEY}`;
    const res   = await fetch(url);
    const data  = await res.json();
    if (data.error) throw new Error(data.error.message);

    const rows = (data.values || []).filter(r => r[0]);
    if (rows.length === 0) {
      container.innerHTML = '<div class="empty-state"><span class="e-icon">📭</span>No completed one-offs yet.</div>';
      return;
    }

    // Sort most recent first
    rows.sort((a, b) => new Date(b[1] || 0) - new Date(a[1] || 0));
    container.innerHTML = renderPastRows(rows);
  } catch(e) {
    container.innerHTML = `<div class="error-msg">⚠️ Couldn't load<br>${e.message}</div>`;
  }
}

function renderPastRows(rows) {
  return rows.map(row => {
    const name = row[0] || '';
    const date = row[1] || '';
    const cats = row[2] || '';
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border)">
        <div style="flex:1">
          <div style="font-size:15px;font-weight:500;color:var(--ink)">${name}</div>
          ${cats ? `<div style="font-size:11px;color:var(--ink-muted);margin-top:2px">📂 ${cats}</div>` : ''}
        </div>
        <div style="font-size:11px;color:var(--ink-soft);text-align:right;line-height:1.5">${date}</div>
      </div>`;
  }).join('') + '<div style="height:1px"></div>';
}

function closePastOneOffs() {
  document.getElementById('past-overlay').classList.remove('open');
  document.getElementById('past-sheet').classList.remove('open');
}

// ─── Snooze task for 1 day ───────────────────────────
const SNOOZE_KEY = 'ritual_snoozed_v1';

function getSnoozed() {
  try { return JSON.parse(localStorage.getItem(SNOOZE_KEY)) || {}; } catch { return {}; }
}

function snoozeTask(sheetRow) {
  const snoozed = getSnoozed();
  snoozed[sheetRow] = Date.now() + 86400000;
  localStorage.setItem(SNOOZE_KEY, JSON.stringify(snoozed));
  showToast('Hidden for 1 day 💤');
}

function isSnoozed(sheetRow) {
  const snoozed = getSnoozed();
  const expiry  = snoozed[sheetRow];
  if (!expiry) return false;
  if (Date.now() > expiry) {
    delete snoozed[sheetRow];
    localStorage.setItem(SNOOZE_KEY, JSON.stringify(snoozed));
    return false;
  }
  return true;
}

// ─── OAuth ────────────────────────────────────────
function initOAuth() {
  if (OAUTH_CLIENT_ID.includes('YOUR_OAUTH_CLIENT_ID_HERE')) {
    showToast('Set OAUTH_CLIENT_ID to enable saving');
    if (pendingWrite?.btn) pendingWrite.btn.disabled = false;
    return;
  }
  if (!window.google) {
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => startTokenFlow();
    document.head.appendChild(s);
  } else { startTokenFlow(); }
}

function startTokenFlow() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: OAUTH_CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        showToast('Sign-in cancelled');
        if (pendingWrite?.btn) pendingWrite.btn.disabled = false;
        return;
      }
      accessToken = resp.access_token;
      // Flush any offline queue now that we have a token
      await flushQueue();
      if (pendingWrite) {
        const pw = pendingWrite; pendingWrite = null;
        if (pw.customCallback) { await pw.customCallback(); }
        else { await writeToSheet(pw.range, pw.value, pw.btn, pw.sheetRow, pw.timestamp, pw.isHome); }
      }
    },
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

// ─── Offline badge ────────────────────────────────
function updateOnlineBadge() {
  const badge = document.getElementById('offline-badge');
  if (badge) badge.style.display = navigator.onLine ? 'none' : 'inline-block';
  // Also show queue count if any
  const q = getQueue();
  if (badge && !navigator.onLine && q.length > 0) {
    badge.textContent = `OFFLINE · ${q.length} queued`;
  }
}
window.addEventListener('online',  updateOnlineBadge);
window.addEventListener('offline', updateOnlineBadge);
updateOnlineBadge();

// ─── Init ─────────────────────────────────────────
loadData();
